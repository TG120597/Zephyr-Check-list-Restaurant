<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zephyr Monaco — Mise en Place</title>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script>(function(){ emailjs.init({ publicKey: 'ZR5ziXCQLKk-OrvoO' }); })();</script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --beige:#F2EDE4; --beige2:#EBE4D9; --beige3:#E2D9CB;
    --terra:#B5603A; --terra-dim:rgba(181,96,58,0.12); --terra-border:rgba(181,96,58,0.3); --terra-dark:#8C4528;
    --stone:#9E8E7E; --stone2:#C8BAA8;
    --text:#3A2E26; --text-dim:#7A6A5A;
    --vert:#5A8A5E; --vert-dim:rgba(90,138,94,0.12);
    --bleu:#4A7A9B; --bleu-dim:rgba(74,122,155,0.12);
    --radius:10px;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--beige); color:var(--text); font-family:'Jost',sans-serif; min-height:100vh;
    background-image:radial-gradient(ellipse 3px 2px at 12% 18%,rgba(181,96,58,.18) 0%,transparent 100%),radial-gradient(ellipse 60% 35% at 50% 0%,rgba(181,96,58,.07) 0%,transparent 70%);
  }

  /* ── LOGIN ── */
  #login-screen { position:fixed; inset:0; background:var(--beige); z-index:999; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:40px 24px; background-image:radial-gradient(ellipse 60% 35% at 50% 0%,rgba(181,96,58,.1) 0%,transparent 70%); }
  #login-screen::before { content:''; position:absolute; top:0; left:0; right:0; height:4px; background:linear-gradient(90deg,var(--beige),var(--terra),var(--terra-dark),var(--terra),var(--beige)); }
  .login-logo { font-family:'Cormorant Garamond',serif; font-size:52px; color:var(--terra-dark); font-style:italic; letter-spacing:.14em; }
  .login-sub { font-size:10px; color:var(--stone); letter-spacing:.4em; text-transform:uppercase; margin-top:4px; margin-bottom:40px; }
  .login-card { background:var(--beige2); border:1px solid var(--stone2); border-radius:16px; padding:28px 24px; width:100%; max-width:360px; }
  .login-title { font-family:'Cormorant Garamond',serif; font-size:22px; color:var(--terra-dark); font-style:italic; margin-bottom:20px; text-align:center; }
  .role-selector { display:flex; gap:8px; margin-bottom:20px; }
  .role-btn { flex:1; padding:10px; border-radius:99px; border:1px solid var(--stone2); background:var(--beige); color:var(--text-dim); font-family:'Jost',sans-serif; font-size:13px; cursor:pointer; transition:all .2s; text-align:center; }
  .role-btn.active { background:var(--terra); border-color:var(--terra); color:var(--beige); font-weight:500; }
  .pin-label { font-size:10px; letter-spacing:.2em; text-transform:uppercase; color:var(--text-dim); margin-bottom:10px; display:block; }
  .pin-dots { display:flex; gap:12px; justify-content:center; margin-bottom:20px; }
  .pin-dot { width:14px; height:14px; border-radius:50%; border:2px solid var(--stone2); background:transparent; transition:all .2s; }
  .pin-dot.filled { background:var(--terra); border-color:var(--terra); }
  .numpad { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
  .num-btn { padding:16px; border-radius:var(--radius); border:1px solid var(--stone2); background:var(--beige); color:var(--text); font-family:'Jost',sans-serif; font-size:20px; cursor:pointer; transition:all .15s; text-align:center; }
  .num-btn:hover { background:var(--beige3); border-color:var(--terra-border); }
  .num-btn:active { transform:scale(.95); }
  .num-btn.del { font-size:16px; color:var(--text-dim); }
  .login-error { color:var(--terra-dark); font-size:12px; text-align:center; margin-top:12px; min-height:18px; }
  .login-name-input { width:100%; background:var(--beige); border:1px solid var(--stone2); border-radius:var(--radius); padding:11px 14px; font-family:'Jost',sans-serif; font-size:14px; color:var(--text); outline:none; caret-color:var(--terra); margin-bottom:16px; transition:border-color .2s; }
  .login-name-input:focus { border-color:var(--terra-border); }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }

  /* ── ROLE BADGE ── */
  .role-badge { position:fixed; top:14px; right:16px; z-index:50; display:flex; align-items:center; gap:8px; }
  .role-pill { background:var(--terra); color:var(--beige); font-size:10px; letter-spacing:.12em; text-transform:uppercase; padding:4px 10px; border-radius:99px; font-weight:500; }
  .role-pill.employee { background:var(--stone); }
  .logout-btn { background:none; border:1px solid var(--stone2); color:var(--text-dim); font-size:11px; padding:4px 10px; border-radius:99px; cursor:pointer; font-family:'Jost',sans-serif; transition:all .2s; }
  .logout-btn:hover { border-color:var(--terra); color:var(--terra); }

  /* ── HEADER ── */
  header { text-align:center; padding:44px 20px 24px; position:relative; border-bottom:1px solid var(--stone2); background:linear-gradient(180deg,rgba(181,96,58,.06) 0%,transparent 100%); }
  header::before { content:''; position:absolute; top:0; left:0; right:0; height:4px; background:linear-gradient(90deg,var(--beige),var(--terra),var(--terra-dark),var(--terra),var(--beige)); }
  header::after { content:''; display:block; width:40px; height:1px; background:var(--terra); margin:14px auto 0; opacity:.5; }
  .logo-text { font-family:'Cormorant Garamond',serif; font-size:clamp(36px,8vw,52px); color:var(--terra-dark); letter-spacing:.14em; font-weight:500; font-style:italic; }
  .restaurant-name { font-size:10px; color:var(--stone); letter-spacing:.4em; text-transform:uppercase; margin-top:6px; }
  .subtitle { font-size:9px; letter-spacing:.28em; text-transform:uppercase; color:var(--stone); margin-top:4px; font-weight:300; opacity:.7; }

  /* ── PROGRESS ── */
  .global-progress { padding:22px 20px 0; max-width:740px; margin:0 auto; }
  .progress-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
  .progress-label { font-size:10px; letter-spacing:.22em; text-transform:uppercase; color:var(--text-dim); font-weight:500; }
  .progress-count { font-family:'Cormorant Garamond',serif; font-size:22px; color:var(--terra); font-weight:600; }
  .progress-bar-bg { background:var(--beige3); border-radius:99px; height:5px; overflow:hidden; border:1px solid var(--stone2); }
  .progress-bar-fill { height:100%; background:linear-gradient(90deg,var(--terra),var(--terra-dark)); border-radius:99px; transition:width .5s cubic-bezier(.4,0,.2,1); width:0%; }

  /* ── TABS ── */
  .tabs-wrap { display:flex; align-items:center; gap:8px; padding:20px 20px 0; max-width:740px; margin:0 auto; }
  .tabs { display:flex; gap:8px; overflow-x:auto; scrollbar-width:none; -webkit-overflow-scrolling:touch; flex:1; }
  .tabs::-webkit-scrollbar { display:none; }
  .tab-btn { flex-shrink:0; background:var(--beige2); border:1px solid var(--stone2); color:var(--text-dim); padding:10px 16px; border-radius:99px; font-family:'Jost',sans-serif; font-size:12px; font-weight:400; cursor:pointer; transition:all .2s; letter-spacing:.06em; display:flex; align-items:center; gap:7px; position:relative; }
  .tab-btn .tab-badge { background:rgba(181,96,58,.08); border-radius:99px; font-size:10px; padding:1px 6px; color:var(--stone); transition:all .2s; }
  .tab-btn.active { background:var(--terra); border-color:var(--terra); color:var(--beige); font-weight:500; box-shadow:0 4px 14px rgba(181,96,58,.25); }
  .tab-btn.active .tab-badge { background:rgba(242,237,228,.2); color:rgba(242,237,228,.9); }
  .tab-btn.done { border-color:var(--vert); color:var(--vert); }
  .tab-btn.done .tab-badge { background:rgba(90,138,94,.1); color:var(--vert); }
  .tab-delete-btn { background:none; border:none; color:rgba(255,255,255,.6); font-size:13px; cursor:pointer; padding:0 0 0 4px; line-height:1; display:none; }
  .tab-btn.active .tab-delete-btn { display:inline; }
  body.manager .tab-btn.active .tab-delete-btn { display:inline; }
  .add-tab-btn { flex-shrink:0; background:var(--terra); border:none; color:var(--beige); width:34px; height:34px; border-radius:50%; font-size:20px; cursor:pointer; display:none; align-items:center; justify-content:center; transition:all .2s; box-shadow:0 2px 8px rgba(181,96,58,.3); }
  body.manager .add-tab-btn { display:flex; }
  .add-tab-btn:hover { background:var(--terra-dark); transform:scale(1.1); }

  /* ── SECTIONS ── */
  .sections { max-width:740px; margin:0 auto; padding:16px 20px 100px; }
  .section { display:none; animation:fadeIn .22s ease; }
  .section.active { display:block; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
  .section-header { display:flex; align-items:center; justify-content:space-between; padding:18px 0 14px; border-bottom:1px solid var(--stone2); margin-bottom:12px; }
  .section-title { font-family:'Cormorant Garamond',serif; font-size:24px; color:var(--terra-dark); display:flex; align-items:center; gap:8px; font-weight:500; font-style:italic; }
  .section-icon { font-size:20px; font-style:normal; }
  .section-progress { font-size:12px; color:var(--text-dim); letter-spacing:.1em; }
  .header-actions { display:flex; gap:8px; align-items:center; }
  .reset-btn { background:none; border:1px solid var(--stone2); color:var(--text-dim); padding:5px 12px; border-radius:99px; font-size:11px; cursor:pointer; font-family:'Jost',sans-serif; letter-spacing:.06em; transition:all .2s; }
  .reset-btn:hover { border-color:var(--terra); color:var(--terra); }
  .add-task-btn { background:var(--terra); border:none; color:var(--beige); width:30px; height:30px; border-radius:50%; font-size:20px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .2s; box-shadow:0 2px 8px rgba(181,96,58,.3); }
  .add-task-btn:hover { background:var(--terra-dark); transform:scale(1.1); }
  .manager-only { display:none !important; }
  body.manager .manager-only { display:flex !important; }
  .rename-btn { background:none; border:none; font-size:13px; cursor:pointer; opacity:.35; padding:0; transition:opacity .2s; display:none; font-style:normal; }
  body.manager .rename-btn { display:inline; }
  .rename-btn:hover { opacity:1; }

  /* ── NAME FIELDS ── */
  .name-fields-row { display:flex; gap:8px; margin-bottom:12px; }
  .name-field { display:flex; align-items:center; gap:10px; background:var(--beige2); border:1px solid var(--stone2); border-radius:var(--radius); padding:11px 14px; flex:1; transition:border-color .2s; }
  .name-field:focus-within { border-color:var(--terra-border); }
  .name-field label { font-size:10px; letter-spacing:.16em; text-transform:uppercase; color:var(--text-dim); font-weight:500; white-space:nowrap; flex-shrink:0; }
  .name-field input { background:transparent; border:none; outline:none; color:var(--text); font-family:'Jost',sans-serif; font-size:14px; width:100%; caret-color:var(--terra); }
  .name-field input::placeholder { color:var(--stone2); }

  /* ── CHECKLIST ── */
  .checklist { list-style:none; }
  .checklist li { border-radius:var(--radius); margin-bottom:6px; background:var(--beige2); border:1px solid var(--stone2); transition:all .18s; overflow:hidden; }
  .task-row { display:flex; align-items:flex-start; gap:10px; padding:12px 14px; }
  .task-arrows { display:none; flex-direction:column; gap:2px; flex-shrink:0; align-self:center; }
  body.manager .task-arrows { display:flex; }
  .arrow-btn { background:none; border:1px solid var(--stone2); color:var(--stone); width:22px; height:22px; border-radius:5px; font-size:11px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .15s; padding:0; }
  .arrow-btn:hover { border-color:var(--terra); color:var(--terra); background:var(--terra-dim); }
  .arrow-btn:disabled { opacity:.2; cursor:default; }
  .arrow-btn:disabled:hover { border-color:var(--stone2); color:var(--stone); background:none; }
  .task-checks { display:flex; flex-direction:column; gap:5px; flex-shrink:0; padding-top:2px; }
  .check-wrap { display:flex; align-items:center; gap:5px; cursor:pointer; user-select:none; }
  .check-label { font-size:9px; letter-spacing:.1em; text-transform:uppercase; color:var(--stone); white-space:nowrap; }
  .check-circle { width:20px; height:20px; min-width:20px; border-radius:50%; border:2px solid var(--stone2); display:flex; align-items:center; justify-content:center; transition:all .18s; background:transparent; }
  .check-wrap:hover .check-circle { border-color:var(--terra); }
  .check-wrap.staff-done .check-circle { background:var(--vert); border-color:var(--vert); }
  .check-wrap.manager-done .check-circle { background:var(--bleu); border-color:var(--bleu); }
  .check-circle svg { opacity:0; transform:scale(.5); transition:all .2s cubic-bezier(.34,1.56,.64,1); }
  .check-wrap.staff-done .check-circle svg,.check-wrap.manager-done .check-circle svg { opacity:1; transform:scale(1); }
  .task-content { flex:1; }
  .item-text { font-size:14px; line-height:1.6; color:var(--text); font-weight:400; transition:all .2s; }
  .task-fully-done .item-text { color:var(--text-dim); text-decoration:line-through; text-decoration-color:rgba(90,138,94,.5); }
  .task-badges { display:flex; gap:5px; margin-top:4px; flex-wrap:wrap; }
  .badge-staff,.badge-manager { font-size:9px; padding:1px 6px; border-radius:4px; display:none; }
  .badge-staff { background:var(--vert-dim); color:var(--vert); border:1px solid rgba(90,138,94,.25); }
  .badge-manager { background:var(--bleu-dim); color:var(--bleu); border:1px solid rgba(74,122,155,.25); }
  .badge-staff.show,.badge-manager.show { display:inline; }
  .item-priority { display:inline-block; background:var(--terra-dim); color:var(--terra-dark); border:1px solid var(--terra-border); font-size:9px; letter-spacing:.15em; text-transform:uppercase; padding:2px 7px; border-radius:4px; margin-bottom:4px; font-weight:500; }
  .task-actions { display:flex; flex-direction:column; gap:4px; flex-shrink:0; align-self:center; }
  .task-edit { background:none; border:1px solid var(--stone2); color:var(--stone); width:24px; height:24px; border-radius:5px; font-size:12px; cursor:pointer; display:none; align-items:center; justify-content:center; transition:all .15s; padding:0; }
  body.manager .task-edit { display:flex; }
  .task-edit:hover { border-color:var(--bleu); color:var(--bleu); background:var(--bleu-dim); }
  .task-delete { background:none; border:1px solid var(--stone2); color:var(--stone); width:24px; height:24px; border-radius:5px; font-size:14px; cursor:pointer; display:none; align-items:center; justify-content:center; transition:all .15s; padding:0; }
  body.manager .task-delete { display:flex; }
  .task-delete:hover { border-color:var(--terra); color:var(--terra); background:var(--terra-dim); }
  .group-label { font-size:9px; letter-spacing:.28em; text-transform:uppercase; color:var(--terra); padding:16px 4px 6px; font-weight:500; opacity:.9; }
  .empty-state { text-align:center; padding:40px 20px; color:var(--text-dim); font-size:13px; opacity:.6; }
  .empty-state .empty-icon { font-size:32px; margin-bottom:10px; }

  /* ── ALL DONE ── */
  .all-done { text-align:center; padding:30px 20px; display:none; }
  .all-done.visible { display:block; }
  .all-done-icon { font-size:40px; margin-bottom:12px; animation:pop .4s cubic-bezier(.34,1.56,.64,1); }
  @keyframes pop { from{transform:scale(0)} to{transform:scale(1)} }
  .all-done h3 { font-family:'Cormorant Garamond',serif; font-size:26px; color:var(--vert); margin-bottom:6px; font-weight:500; font-style:italic; }
  .all-done p { font-size:13px; color:var(--text-dim); }

  /* ── WEEKLY ── */
  .day-block { background:var(--beige2); border:1px solid var(--stone2); border-radius:var(--radius); margin-bottom:8px; overflow:hidden; }
  .day-header { display:flex; align-items:center; justify-content:space-between; padding:13px 16px; cursor:pointer; transition:background .15s; user-select:none; }
  .day-header:hover { background:var(--beige3); }
  .day-title-wrap { display:flex; align-items:center; gap:10px; }
  .day-name { font-family:'Cormorant Garamond',serif; font-size:18px; color:var(--terra-dark); font-style:italic; font-weight:500; }
  .day-count { font-size:11px; color:var(--stone); }
  .day-chevron { font-size:12px; color:var(--stone); transition:transform .2s; }
  .day-block.open .day-chevron { transform:rotate(180deg); }
  .day-tasks { display:none; padding:0 14px 12px; }
  .day-block.open .day-tasks { display:block; }
  .day-task-item { display:flex; align-items:center; gap:10px; padding:9px 10px; border-radius:8px; margin-bottom:4px; transition:background .15s; border:1px solid transparent; }
  .day-task-item:hover { background:var(--beige3); border-color:var(--terra-border); }
  .day-task-item.fully-done .day-task-text { text-decoration:line-through; color:var(--text-dim); }
  .day-task-checks { display:flex; gap:5px; flex-shrink:0; }
  .day-check-wrap { display:flex; flex-direction:column; align-items:center; gap:2px; cursor:pointer; }
  .day-check-label { font-size:8px; text-transform:uppercase; color:var(--stone); white-space:nowrap; }
  .day-task-circle { width:18px; height:18px; border-radius:50%; border:2px solid var(--stone2); display:flex; align-items:center; justify-content:center; transition:all .18s; }
  .day-check-wrap:hover .day-task-circle { border-color:var(--terra); }
  .day-check-wrap.staff-done .day-task-circle { background:var(--vert); border-color:var(--vert); }
  .day-check-wrap.manager-done .day-task-circle { background:var(--bleu); border-color:var(--bleu); }
  .day-task-text { font-size:13px; color:var(--text); flex:1; }
  .day-task-delete { background:none; border:none; color:var(--stone2); font-size:16px; cursor:pointer; display:none; }
  body.manager .day-task-delete { display:block; }
  .day-task-delete:hover { color:var(--terra); }
  .day-add-btn { display:none; align-items:center; gap:6px; padding:7px 10px; border-radius:8px; margin-top:6px; background:none; border:1px dashed var(--stone2); color:var(--text-dim); font-family:'Jost',sans-serif; font-size:12px; cursor:pointer; width:100%; transition:all .2s; }
  body.manager .day-add-btn { display:flex; }
  .day-add-btn:hover { border-color:var(--terra); color:var(--terra); }

  /* ── MODAL ── */
  .modal-overlay { position:fixed; inset:0; background:rgba(58,46,38,.5); display:flex; align-items:flex-end; justify-content:center; z-index:100; opacity:0; pointer-events:none; transition:opacity .2s; }
  .modal-overlay.open { opacity:1; pointer-events:all; }
  .modal { background:var(--beige); border-radius:18px 18px 0 0; padding:24px 20px 40px; width:100%; max-width:740px; transform:translateY(100%); transition:transform .3s cubic-bezier(.4,0,.2,1); }
  .modal-overlay.open .modal { transform:translateY(0); }
  .modal h3 { font-family:'Cormorant Garamond',serif; font-size:22px; color:var(--terra-dark); font-style:italic; margin-bottom:16px; }
  .modal input[type="text"] { width:100%; background:var(--beige2); border:1px solid var(--stone2); border-radius:var(--radius); padding:13px 16px; font-family:'Jost',sans-serif; font-size:14px; color:var(--text); outline:none; caret-color:var(--terra); margin-bottom:12px; transition:border-color .2s; }
  .modal input[type="text"]:focus { border-color:var(--terra-border); }
  .modal-label { font-size:10px; letter-spacing:.18em; text-transform:uppercase; color:var(--text-dim); font-weight:500; margin-bottom:6px; display:block; }
  .modal-actions { display:flex; gap:8px; margin-top:4px; }
  .modal-cancel { flex:1; background:none; border:1px solid var(--stone2); color:var(--text-dim); padding:12px; border-radius:var(--radius); font-family:'Jost',sans-serif; font-size:13px; cursor:pointer; transition:all .2s; }
  .modal-cancel:hover { border-color:var(--terra); color:var(--terra); }
  .modal-confirm { flex:2; background:var(--terra); border:none; color:var(--beige); padding:12px; border-radius:var(--radius); font-family:'Jost',sans-serif; font-size:13px; font-weight:500; cursor:pointer; transition:all .2s; }
  .modal-confirm:hover { background:var(--terra-dark); }
  .emoji-picker { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:14px; }
  .emoji-opt { font-size:22px; cursor:pointer; padding:6px; border-radius:8px; border:2px solid transparent; transition:all .15s; }
  .emoji-opt:hover,.emoji-opt.selected { border-color:var(--terra); background:var(--terra-dim); }

  /* ── GLOBAL BAR ── */
  .global-bar { position:fixed; bottom:0; left:0; right:0; z-index:40; padding:12px 20px; background:var(--beige); border-top:1px solid var(--stone2); }
  .global-bar-inner { max-width:740px; margin:0 auto; }
  .send-report-btn { width:100%; margin-top:0; background:var(--terra); border:none; color:var(--beige); padding:14px 20px; border-radius:var(--radius); font-family:'Jost',sans-serif; font-size:13px; font-weight:500; letter-spacing:.08em; cursor:pointer; transition:all .2s; display:flex; align-items:center; justify-content:center; gap:8px; }
  .send-report-btn:hover { background:var(--terra-dark); }

<script>
// ══════════════════════════════════════════════

const CODES = { employee:'0000', manager:'2026' };
const EMAILJS_SERVICE = 'service_yw9i4oh', EMAILJS_TEMPLATE = 'template_3o72gvv';
const SVG = '<svg width="10" height="8" viewBox="0 0 11 9" fill="none"><path d="M1 4L4 7.5L10 1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>';

// Default tabs
const DEFAULT_TABS = [

// ══════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════
let state = {};
try { const s = localStorage.getItem('zephyr_v6'); if(s) state = JSON.parse(s); } catch(e) {}
function save() { try { localStorage.setItem('zephyr_v6', JSON.stringify(state)); } catch(e) {} }

function getTabs() {
  if(!state.tabs) state.tabs = JSON.parse(JSON.stringify(DEFAULT_TABS));
  return state.tabs;
}
function getTasks(id) {
  if(!state.tasks) state.tasks = {};
  if(!state.tasks[id]) {
    state.tasks[id] = DEFAULT_TASKS_DATA[id] ? JSON.parse(JSON.stringify(DEFAULT_TASKS_DATA[id])) : [];
  }
  return state.tasks[id];
}
function getWeeklyData() { if(!state.weekly) state.weekly = JSON.parse(JSON.stringify(DEFAULT_WEEKLY)); return state.weekly; }
function getWeeklyDone() { if(!state.weeklyDone) state.weeklyDone = {}; return state.weeklyDone; }

// ══════════════════════════════════════════════
// LOGIN
// ══════════════════════════════════════════════
let selectedRole = 'employee', currentPin = '', currentUser = '', currentRole = '';

function selectRole(r) {
  selectedRole = r;
  document.getElementById('role-btn-employee').classList.toggle('active', r==='employee');
  document.getElementById('role-btn-manager').classList.toggle('active', r==='manager');
  currentPin = ''; updateDots();
  document.getElementById('login-error').textContent = '';
}
function pinPress(d) { if(currentPin.length>=4) return; currentPin+=d; updateDots(); if(currentPin.length===4) setTimeout(tryLogin,150); }
function pinDelete() { currentPin=currentPin.slice(0,-1); updateDots(); }
function pinClear() { currentPin=''; updateDots(); }
function updateDots() { for(let i=0;i<4;i++) document.getElementById('dot-'+i).classList.toggle('filled',i<currentPin.length); }

function tryLogin() {
  const name = document.getElementById('login-name').value.trim();
  if(!name) { document.getElementById('login-error').textContent='Veuillez entrer votre prénom.'; currentPin=''; updateDots(); return; }
  if(currentPin === CODES[selectedRole]) {
    currentRole = selectedRole; currentUser = name;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    document.getElementById('global-bar').style.display = 'block';
    document.getElementById('role-badge').style.display = 'flex';
    const pill = document.getElementById('role-pill');
    pill.textContent = currentRole==='manager' ? '🔑 Manager — '+currentUser : '👤 '+currentUser;
    pill.className = 'role-pill'+(currentRole==='employee'?' employee':'');
    document.body.className = currentRole;
    initApp();
  } else {
    document.getElementById('login-error').textContent = 'Code incorrect. Réessayez.';
    currentPin=''; updateDots();
    const card = document.querySelector('.login-card');
    card.style.animation='none'; setTimeout(()=>{ card.style.animation='shake .3s ease'; },10);
  }
}
function logout() {
  currentRole=''; currentUser=''; currentPin='';
  document.body.className='';
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('app').style.display='none';
  document.getElementById('global-bar').style.display='none';
  document.getElementById('role-badge').style.display='none';
  document.getElementById('login-name').value='';
  document.getElementById('login-error').textContent='';
  updateDots();
}

// ══════════════════════════════════════════════
// TABS RENDERING
// ══════════════════════════════════════════════
let activeTab = '';

function renderTabs() {
  const tabs = getTabs();
  const container = document.getElementById('tabs-container');
  const sections = document.getElementById('sections-container');
  container.innerHTML = '';
  sections.innerHTML = '';

  tabs.forEach((tab, idx) => {
    // Tab button
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (tab.id === activeTab ? ' active' : '');
    btn.id = 'tab-'+tab.id;
    btn.onclick = () => showTab(tab.id);

    if(tab.id === 'weekly') {
      btn.innerHTML = `${tab.emoji} ${tab.name} <span class="tab-badge" id="badge-weekly"></span>`;
    } else {
      const {checked,total} = countSection(tab.id);
      const done = checked===total && total>0;
      if(done) btn.classList.add('done');
      btn.innerHTML = `${tab.emoji} ${tab.name} <span class="tab-badge" id="badge-${tab.id}">${checked}/${total}</span>
        <button class="tab-delete-btn" onclick="deleteTab('${tab.id}');event.stopPropagation()" title="Supprimer">✕</button>`;
    }
    container.appendChild(btn);

    // Section
    if(tab.id === 'weekly') {
      const sec = document.createElement('div');
      sec.className = 'section' + (tab.id === activeTab ? ' active' : '');
      sec.id = 'section-weekly';
      sec.innerHTML = `
        <div class="section-header">
          <div class="section-title"><span class="section-icon">📅</span><span>Tâches hebdo</span></div>
          <div class="header-actions">
            <button class="reset-btn manager-only" onclick="resetWeekly()">Réinit.</button>
          </div>
        </div>
        <div id="weekly-container"></div>
        <button class="weekly-send-btn" onclick="sendWeeklyReport()">📧 Rapport hebdo</button>`;
      sections.appendChild(sec);
      if(tab.id === activeTab) renderWeekly();
    } else {
      const sec = document.createElement('div');
      sec.className = 'section' + (tab.id === activeTab ? ' active' : '');
      sec.id = 'section-'+tab.id;
      const names = state.names || {};
      sec.innerHTML = `
        <div class="section-header">
          <div class="section-title">
            <span class="section-icon">${tab.emoji}</span>
            <span>${tab.name}</span>
            <button class="rename-btn manager-only" onclick="openRenameTab('${tab.id}')">✏️</button>
          </div>
          <div class="header-actions">
            <span class="section-progress" id="prog-${tab.id}"></span>
            <button class="reset-btn manager-only" onclick="resetSection('${tab.id}')">Réinit.</button>
            <button class="add-task-btn manager-only" onclick="openAddTask('${tab.id}')">+</button>
          </div>
        </div>
        <div class="name-fields-row">
          <div class="name-field">
            <label><span>👤</span> Employé</label>
            <input type="text" id="name-staff-${tab.id}" placeholder="Prénom..." oninput="saveName('${tab.id}','staff',this.value)" autocomplete="off" value="${names['staff_'+tab.id]||''}">
          </div>
          <div class="name-field" style="border-left:2px solid var(--bleu)">
            <label style="color:var(--bleu)"><span>✓</span> Manager</label>
            <input type="text" id="name-manager-${tab.id}" placeholder="Prénom..." oninput="saveName('${tab.id}','manager',this.value)" autocomplete="off" value="${names['manager_'+tab.id]||''}">
          </div>
        </div>
        <ul class="checklist" id="list-${tab.id}"></ul>
        <div class="all-done" id="done-${tab.id}">
          <div class="all-done-icon">✅</div>
          <h3>${tab.name} complet !</h3>
          <p>Toutes les tâches effectuées et validées.</p>
        </div>`;
      sections.appendChild(sec);
      renderChecklist(tab.id);
    }
  });

  // Pre-fill name for logged user
  tabs.forEach(tab => {
    if(tab.id==='weekly') return;
    const si = document.getElementById('name-staff-'+tab.id);
    const mi = document.getElementById('name-manager-'+tab.id);
    if(currentRole==='employee' && si && !si.value) si.value = currentUser;
    if(currentRole==='manager' && mi && !mi.value) mi.value = currentUser;
  });

  updateGlobal();
  updateWeeklyBadge();
}

function showTab(id) {
  activeTab = id;
  renderTabs();
  if(id==='weekly') renderWeekly();
}

// ══════════════════════════════════════════════
// CHECKLIST RENDER
// ══════════════════════════════════════════════
function renderChecklist(id) {
  const tasks = getTasks(id);
  const sa = state['staff_'+id] || [];
  const ma = state['manager_'+id] || [];
  const ul = document.getElementById('list-'+id);
  if(!ul) return;
  ul.innerHTML = '';

  if(tasks.length === 0) {
    ul.innerHTML = `<div class="empty-state"><div class="empty-icon">📝</div>Aucune tâche — appuie sur + pour en ajouter</div>`;
    updateBadge(id);
    return;
  }

  tasks.forEach((task, i) => {
    const li = document.createElement('li');
    if(sa[i]&&ma[i]) li.classList.add('task-fully-done');
    li.innerHTML = `<div class="task-row">
      <div class="task-arrows">
        <button class="arrow-btn" onclick="moveTask('${id}',${i},-1)" ${i===0?'disabled':''}>▲</button>
        <button class="arrow-btn" onclick="moveTask('${id}',${i},1)" ${i===tasks.length-1?'disabled':''}>▼</button>
      </div>
      <div class="task-checks">
        <div class="check-wrap${sa[i]?' staff-done':''}" onclick="toggleStaff('${id}',${i},this)">
          <div class="check-circle">${SVG}</div><span class="check-label">Équipe</span>
        </div>
        <div class="check-wrap${ma[i]?' manager-done':''}" onclick="toggleManager('${id}',${i},this)">
          <div class="check-circle">${SVG}</div><span class="check-label" style="color:var(--bleu)">Manager</span>
        </div>
      </div>
      <div class="task-content">
        ${task.priority?`<div class="item-priority">${task.priority}</div>`:''}
        <div class="item-text">${task.text}</div>
        <div class="task-badges">
          <span class="badge-staff${sa[i]?' show':''}">✓ Équipe</span>
          <span class="badge-manager${ma[i]?' show':''}">✓ Manager</span>
        </div>
      </div>
      <div class="task-actions">
        <button class="task-edit" onclick="openEditTask('${id}',${i})">✏️</button>
        <button class="task-delete" onclick="deleteTask('${id}',${i})">×</button>
      </div>
    </div>`;
    ul.appendChild(li);
  });
  updateBadge(id);
}

// ══════════════════════════════════════════════
// CHECK LOGIC
// ══════════════════════════════════════════════
function toggleStaff(id, idx, el) {
  el.classList.toggle('staff-done');
  const li = el.closest('li');
  li.querySelector('.badge-staff')?.classList.toggle('show', el.classList.contains('staff-done'));
  li.classList.toggle('task-fully-done', el.classList.contains('staff-done') && li.querySelector('.check-wrap:last-child').classList.contains('manager-done'));
  saveSectionState(id); updateBadge(id); updateGlobal();
}
function toggleManager(id, idx, el) {
  if(currentRole!=='manager') { showToast('Réservé au manager 🔑'); return; }
  el.classList.toggle('manager-done');
  const li = el.closest('li');
  li.querySelector('.badge-manager')?.classList.toggle('show', el.classList.contains('manager-done'));
  li.classList.toggle('task-fully-done', el.classList.contains('manager-done') && li.querySelector('.check-wrap:first-child').classList.contains('staff-done'));
  saveSectionState(id); updateBadge(id); updateGlobal();
}
function saveSectionState(id) {
  const items = document.getElementById('list-'+id)?.querySelectorAll('li');
  if(!items) return;
  const s=[], m=[];
  items.forEach(li => { const ws=li.querySelectorAll('.check-wrap'); s.push(ws[0]?.classList.contains('staff-done')||false); m.push(ws[1]?.classList.contains('manager-done')||false); });
  state['staff_'+id]=s; state['manager_'+id]=m; save();
}
function countSection(id) {
  const tasks = getTasks(id);
  const sa = state['staff_'+id]||[], ma = state['manager_'+id]||[];
  const done = tasks.filter((_,i)=>sa[i]&&ma[i]).length;
  return { checked:done, total:tasks.length };
}
function updateBadge(id) {
  const {checked,total} = countSection(id);
  const b = document.getElementById('badge-'+id); if(b) b.textContent=checked+'/'+total;
  const p = document.getElementById('prog-'+id); if(p) p.textContent=checked+' / '+total;
  const tab = document.getElementById('tab-'+id);
  if(tab) tab.classList.toggle('done', checked===total&&total>0&&id!=='weekly');
  const done = document.getElementById('done-'+id);
  if(done) done.classList.toggle('visible', checked===total&&total>0);
}
function updateGlobal() {
  let tc=0, ta=0;
  getTabs().filter(t=>t.id!=='weekly').forEach(t=>{ const{checked,total}=countSection(t.id); tc+=checked; ta+=total; });
  document.getElementById('globalCount').textContent=tc+' / '+ta;
  document.getElementById('globalBar').style.width=(ta>0?(tc/ta*100):0)+'%';
}
function resetSection(id) {
  state['staff_'+id]=[]; state['manager_'+id]=[];
  if(!state.names)state.names={};
  state.names['staff_'+id]=''; state.names['manager_'+id]='';
  const si=document.getElementById('name-staff-'+id); if(si)si.value='';
  const mi=document.getElementById('name-manager-'+id); if(mi)mi.value='';
  save(); renderChecklist(id); updateGlobal(); showToast('Section réinitialisée ✓');
}

// ══════════════════════════════════════════════
// MOVE TASK
// ══════════════════════════════════════════════
function moveTask(id, idx, dir) {
  const tasks=getTasks(id), sa=state['staff_'+id]||[], ma=state['manager_'+id]||[];
  const ni=idx+dir; if(ni<0||ni>=tasks.length)return;
  [tasks[idx],tasks[ni]]=[tasks[ni],tasks[idx]];
  [sa[idx],sa[ni]]=[sa[ni]||false,sa[idx]||false];
  [ma[idx],ma[ni]]=[ma[ni]||false,ma[idx]||false];
  state['tasks'][id]=tasks; state['staff_'+id]=sa; state['manager_'+id]=ma;
  save(); renderChecklist(id);
}

// ══════════════════════════════════════════════
// ADD / EDIT / DELETE TASK
// ══════════════════════════════════════════════
let addTaskTarget='', editTaskTarget='', editTaskIdx=-1;

function openAddTask(id) { addTaskTarget=id; document.getElementById('add-task-input').value=''; openModal('modal-add-task'); setTimeout(()=>document.getElementById('add-task-input').focus(),300); }
function confirmAddTask() {
  const text=document.getElementById('add-task-input').value.trim(); if(!text)return;
  getTasks(addTaskTarget).push({text}); save(); renderChecklist(addTaskTarget); closeModal('modal-add-task'); showToast('Tâche ajoutée ✓');
}
function openEditTask(id, idx) { editTaskTarget=id; editTaskIdx=idx; document.getElementById('edit-task-input').value=getTasks(id)[idx].text; openModal('modal-edit-task'); setTimeout(()=>document.getElementById('edit-task-input').focus(),300); }
function confirmEditTask() {
  const text=document.getElementById('edit-task-input').value.trim(); if(!text)return;
  getTasks(editTaskTarget)[editTaskIdx].text=text; save(); renderChecklist(editTaskTarget); closeModal('modal-edit-task'); showToast('Tâche modifiée ✓');
}
function deleteTask(id, idx) {
  const tasks=getTasks(id), sa=state['staff_'+id]||[], ma=state['manager_'+id]||[];
  tasks.splice(idx,1); sa.splice(idx,1); ma.splice(idx,1);
  state['tasks'][id]=tasks; state['staff_'+id]=sa; state['manager_'+id]=ma;
  save(); renderChecklist(id); updateGlobal();
}

// ══════════════════════════════════════════════
// TAB MANAGEMENT
// ══════════════════════════════════════════════
let selectedEmojiRename='', selectedEmojiNew='🌅', renameTabTarget='';

function selectEmoji(el) { document.querySelectorAll('#emoji-picker .emoji-opt').forEach(e=>e.classList.remove('selected')); el.classList.add('selected'); selectedEmojiRename=el.textContent; }
function selectEmojiNew(el) { document.querySelectorAll('#emoji-picker-new .emoji-opt').forEach(e=>e.classList.remove('selected')); el.classList.add('selected'); selectedEmojiNew=el.textContent; }

function openRenameTab(id) {
  renameTabTarget=id; const tab=getTabs().find(t=>t.id===id);
  document.getElementById('rename-tab-input').value=tab?tab.name:'';
  selectedEmojiRename=tab?tab.emoji:'';
  document.querySelectorAll('#emoji-picker .emoji-opt').forEach(e=>{ e.classList.toggle('selected',e.textContent===selectedEmojiRename); });
  openModal('modal-rename-tab'); setTimeout(()=>document.getElementById('rename-tab-input').focus(),300);
}
function confirmRenameTab() {
  const name=document.getElementById('rename-tab-input').value.trim(); if(!name)return;
  const tabs=getTabs(); const tab=tabs.find(t=>t.id===renameTabTarget);
  if(tab){ tab.name=name; if(selectedEmojiRename)tab.emoji=selectedEmojiRename; }
  save(); closeModal('modal-rename-tab'); renderTabs(); showToast('Onglet renommé ✓');
}

function openNewTabModal() {
  document.getElementById('new-tab-input').value=''; selectedEmojiNew='🌅';
  document.querySelectorAll('#emoji-picker-new .emoji-opt').forEach((e,i)=>e.classList.toggle('selected',i===0));
  openModal('modal-new-tab'); setTimeout(()=>document.getElementById('new-tab-input').focus(),300);
}
function confirmNewTab() {
  const name=document.getElementById('new-tab-input').value.trim(); if(!name)return;
  const id='tab_'+Date.now();
  const tabs=getTabs();
  const weeklyIdx=tabs.findIndex(t=>t.id==='weekly');
  const newTab={id,emoji:selectedEmojiNew||'📋',name};
  if(weeklyIdx>=0)tabs.splice(weeklyIdx,0,newTab); else tabs.push(newTab);
  if(!state.tasks)state.tasks={}; state.tasks[id]=[];
  save(); activeTab=id; closeModal('modal-new-tab'); renderTabs(); showToast('Onglet créé ✓');
}

function deleteTab(id) {
  if(!confirm('Supprimer cet onglet et toutes ses tâches ?')) return;
  const tabs=getTabs();
  const idx=tabs.findIndex(t=>t.id===id); if(idx>=0)tabs.splice(idx,1);
  delete state.tasks?.[id]; delete state['staff_'+id]; delete state['manager_'+id];
  save();
  activeTab=tabs[0]?.id||'weekly';
  renderTabs(); updateGlobal(); showToast('Onglet supprimé ✓');
}

// ══════════════════════════════════════════════
// NAMES
// ══════════════════════════════════════════════
function saveName(id, role, value) { if(!state.names)state.names={}; state.names[role+'_'+id]=value; save(); }

// ══════════════════════════════════════════════
// WEEKLY
// ══════════════════════════════════════════════
function renderWeekly() {
  const data=getWeeklyData(), done=getWeeklyDone();
  const c=document.getElementById('weekly-container'); if(!c)return;
  c.innerHTML='';
  DAYS.forEach(day=>{
    const tasks=data[day]||[], sa=done['staff_'+day]||[], ma=done['manager_'+day]||[];
    const fd=tasks.filter((_,i)=>sa[i]&&ma[i]).length;
    const block=document.createElement('div');
    block.className='day-block'+(day===TODAY?' open':'');
    block.innerHTML=`<div class="day-header" onclick="this.parentElement.classList.toggle('open')">
      <div class="day-title-wrap"><span>${DAY_ICONS[day]}</span><span class="day-name">${DAY_LABELS[day]}</span><span class="day-count" id="dcnt-${day}">${fd}/${tasks.length}${day===TODAY?' — Aujourd\'hui':''}</span></div>
      <span class="day-chevron">▾</span></div>
      <div class="day-tasks" id="dtasks-${day}"></div>`;
    c.appendChild(block);
    renderDayTasks(day);
  });
  updateWeeklyBadge();
}
function renderDayTasks(day) {
  const data=getWeeklyData(), done=getWeeklyDone();
  const tasks=data[day]||[], sa=done['staff_'+day]||[], ma=done['manager_'+day]||[];
  const c=document.getElementById('dtasks-'+day); if(!c)return;
  c.innerHTML='';
  tasks.forEach((t,i)=>{
    const sd=sa[i]||false, md=ma[i]||false, fd=sd&&md;
    const item=document.createElement('div');
    item.className='day-task-item'+(fd?' fully-done':'');
    item.innerHTML=`<div class="day-task-checks">
      <div class="day-check-wrap${sd?' staff-done':''}" onclick="toggleDayStaff('${day}',${i})">
        <div class="day-task-circle">${sd?SVG:''}</div><span class="day-check-label">Équipe</span></div>
      <div class="day-check-wrap${md?' manager-done':''}" onclick="toggleDayManager('${day}',${i})">
        <div class="day-task-circle">${md?SVG:''}</div><span class="day-check-label" style="color:var(--bleu)">Mgr</span></div>
    </div>
    <div style="flex:1"><div class="day-task-text">${t}</div></div>
    <button class="day-task-delete" onclick="deleteDayTask('${day}',${i})">×</button>`;
    c.appendChild(item);
  });
  const btn=document.createElement('button'); btn.className='day-add-btn'; btn.innerHTML='+ Ajouter'; btn.onclick=()=>addDayTask(day); c.appendChild(btn);
}
function toggleDayStaff(day,idx) { const done=getWeeklyDone(); if(!done['staff_'+day])done['staff_'+day]=[]; done['staff_'+day][idx]=!done['staff_'+day][idx]; save(); renderDayTasks(day); updateDayCount(day); updateWeeklyBadge(); }
function toggleDayManager(day,idx) {
  if(currentRole!=='manager'){showToast('Réservé au manager 🔑');return;}
  const done=getWeeklyDone(); if(!done['manager_'+day])done['manager_'+day]=[]; done['manager_'+day][idx]=!done['manager_'+day][idx]; save(); renderDayTasks(day); updateDayCount(day); updateWeeklyBadge();
}
function deleteDayTask(day,idx) {
  if(currentRole!=='manager')return;
  const data=getWeeklyData(),done=getWeeklyDone();
  data[day].splice(idx,1); if(done['staff_'+day])done['staff_'+day].splice(idx,1); if(done['manager_'+day])done['manager_'+day].splice(idx,1);
  save(); renderDayTasks(day); updateDayCount(day); updateWeeklyBadge();
}
function addDayTask(day) { const text=prompt('Nouvelle tâche pour '+DAY_LABELS[day]+' :'); if(!text||!text.trim())return; getWeeklyData()[day].push(text.trim()); save(); renderDayTasks(day); updateDayCount(day); updateWeeklyBadge(); }
function updateDayCount(day) { const data=getWeeklyData(),done=getWeeklyDone(); const tasks=data[day]||[],sa=done['staff_'+day]||[],ma=done['manager_'+day]||[]; const fd=tasks.filter((_,i)=>sa[i]&&ma[i]).length; const cnt=document.getElementById('dcnt-'+day); if(cnt)cnt.textContent=fd+'/'+tasks.length+(day===TODAY?' — Aujourd\'hui':''); }
function updateWeeklyBadge() { const data=getWeeklyData(),done=getWeeklyDone(); let t=0,d=0; DAYS.forEach(day=>{const tasks=data[day]||[],sa=done['staff_'+day]||[],ma=done['manager_'+day]||[];t+=tasks.length;d+=tasks.filter((_,i)=>sa[i]&&ma[i]).length;}); const b=document.getElementById('badge-weekly');if(b)b.textContent=d+'/'+t; }
function resetWeekly() { state.weeklyDone={}; save(); renderWeekly(); showToast('Hebdo réinitialisé ✓'); }

// ══════════════════════════════════════════════
// MODAL HELPERS
// ══════════════════════════════════════════════
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

// ══════════════════════════════════════════════
// REPORTS
// ══════════════════════════════════════════════
async function sendFullReport() {
  const now=new Date().toLocaleDateString('fr-FR',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  let msg='RAPPORT COMPLET — ZEPHYR MONACO\n'+'='.repeat(34)+'\nDate : '+now+'\n';
  const names=state.names||{};
  getTabs().filter(t=>t.id!=='weekly').forEach(tab=>{
    const tasks=getTasks(tab.id), sa=state['staff_'+tab.id]||[], ma=state['manager_'+tab.id]||[];
    const lines=tasks.map((t,i)=>(sa[i]&&ma[i]?'✅':sa[i]?'⚠️':'❌')+' '+t.text);
    msg+='\n\n── '+tab.emoji+' '+tab.name.toUpperCase()+' ──\n';
    msg+='Employé : '+(names['staff_'+tab.id]||'—')+' | Manager : '+(names['manager_'+tab.id]||'—')+'\n';
    msg+=lines.length>0?lines.join('\n'):'(aucune tâche)';
  });
  const data=getWeeklyData(),done=getWeeklyDone();
  msg+='\n\n── 📅 HEBDOMADAIRE ──';
  DAYS.forEach(day=>{ const tasks=data[day]||[],sa=done['staff_'+day]||[],ma=done['manager_'+day]||[]; if(tasks.length>0){msg+='\n'+DAY_LABELS[day]+' : '+tasks.map((t,i)=>(sa[i]&&ma[i]?'✅':'❌')+' '+t).join(' | ');} });
  msg+='\n\n— Envoyé depuis l\'application Zephyr Monaco';
  showToast('Envoi en cours...');
  try { await emailjs.send(EMAILJS_SERVICE,EMAILJS_TEMPLATE,{subject:'Rapport Complet — '+now,message:msg,name:currentUser||'Zephyr',email:'restaurant@zephyrmonaco.com'}); showToast('✅ Rapport envoyé !'); }
  catch(e) { showToast('❌ Erreur : '+(e.text||e.message)); }
}
async function sendWeeklyReport() {
  const now=new Date().toLocaleDateString('fr-FR',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  const data=getWeeklyData(),done=getWeeklyDone();
  let lines=[];
  DAYS.forEach(day=>{ lines.push('\n— '+DAY_LABELS[day].toUpperCase()+' —'); const tasks=data[day]||[],sa=done['staff_'+day]||[],ma=done['manager_'+day]||[]; tasks.forEach((t,i)=>lines.push((sa[i]&&ma[i]?'✅':sa[i]?'⚠️':'❌')+' '+t)); });
  const msg='RAPPORT HEBDOMADAIRE — ZEPHYR MONACO\n'+'='.repeat(37)+'\nDate : '+now+'\n'+lines.join('\n')+'\n\n— Envoyé depuis l\'application Zephyr Monaco';
  showToast('Envoi en cours...');
  try { await emailjs.send(EMAILJS_SERVICE,EMAILJS_TEMPLATE,{subject:'Rapport Hebdo — '+now,message:msg,name:currentUser||'Zephyr',email:'restaurant@zephyrmonaco.com'}); showToast('✅ Rapport hebdo envoyé !'); }
  catch(e) { showToast('❌ Erreur : '+(e.text||e.message)); }
}

// ══════════════════════════════════════════════
// TOAST
// ══════════════════════════════════════════════
function showToast(msg) { const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500); }

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════
function initApp() {
  if(!state.tasks) state.tasks={};
  const tabs=getTabs();
  activeTab = tabs[0]?.id || 'matin';
  renderTabs();
}
</script>
