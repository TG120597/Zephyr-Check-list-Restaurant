<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.8.1/firebase-app.js";
  import { getFirestore, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.8.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCPP1hMK6PHeSW7WiJZvQ_r-7yvRm1bfJM",
    authDomain: "zephyr-monaco.firebaseapp.com",
    projectId: "zephyr-monaco",
    storageBucket: "zephyr-monaco.firebasestorage.app",
    messagingSenderId: "889758734631",
    appId: "1:889758734631:web:639f47062a9d891726b102"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const DOC = doc(db, 'zephyr', 'state');

  // Save to Firestore
  window.fbSave = async function(state) {
    try {
      await setDoc(DOC, { data: JSON.stringify(state) });
    } catch(e) { console.error('Firebase save error:', e); }
  };

  // Real-time listener
  window.fbListen = function(callback) {
    return onSnapshot(DOC, (snap) => {
      if (snap.exists()) {
        try {
          const data = JSON.parse(snap.data().data);
          callback(data);
        } catch(e) {}
      }
    });
  };

  // Load once
  window.fbLoad = async function() {
    try {
      const snap = await getDoc(DOC);
      if (snap.exists()) return JSON.parse(snap.data().data);
    } catch(e) {}
    return null;
  };

  window.firebaseReady = true;
  document.dispatchEvent(new Event('firebase-ready'));
</script>

<style>
  :root {
    --beige:#F2EDE4; --beige2:#EBE4D9; --beige3:#E2D9CB;
    --terra:#B5603A; --terra-dim:rgba(181,96,58,0.12); --terra-border:rgba(181,96,58,0.3); --terra-dark:#8C4528;
    --stone:#9E8E7E; --stone2:#C8BAA8;
    --text:#3A2E26; --text-dim:#7A6A5A;
    --vert:#5A8A5E; --vert-dim:rgba(90,138,94,0.12);
    --bleu:#4A7A9B; --bleu-dim:rgba(74,122,155,0.12);
    --radius:10px;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--beige); color:var(--text); font-family:'Jost',sans-serif; min-height:100vh;
    background-image:radial-gradient(ellipse 3px 2px at 12% 18%,rgba(181,96,58,.18) 0%,transparent 100%),radial-gradient(ellipse 60% 35% at 50% 0%,rgba(181,96,58,.07) 0%,transparent 70%);
  }
  /* ── LOGIN ── */
  #login-screen { position:fixed; inset:0; background:var(--beige); z-index:999; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:40px 24px; background-image:radial-gradient(ellipse 60% 35% at 50% 0%,rgba(181,96,58,.1) 0%,transparent 70%); }
  #login-screen::before { content:''; position:absolute; top:0; left:0; right:0; height:4px; background:linear-gradient(90deg,var(--beige),var(--terra),var(--terra-dark),var(--terra),var(--beige)); }
  .login-logo { font-family:'Cormorant Garamond',serif; font-size:52px; color:var(--terra-dark); font-style:italic; letter-spacing:.14em; }
  .login-sub { font-size:10px; color:var(--stone); letter-spacing:.4em; text-transform:uppercase; margin-top:4px; margin-bottom:40px; }
  .login-card { background:var(--beige2); border:1px solid var(--stone2); border-radius:16px; padding:28px 24px; width:100%; max-width:360px; }
  .login-title { font-family:'Cormorant Garamond',serif; font-size:22px; color:var(--terra-dark); font-style:italic; margin-bottom:20px; text-align:center; }
  .role-selector { display:flex; gap:8px; margin-bottom:20px; }
  .role-btn { flex:1; padding:10px; border-radius:99px; border:1px solid var(--stone2); background:var(--beige); color:var(--text-dim); font-family:'Jost',sans-serif; font-size:13px; cursor:pointer; transition:all .2s; text-align:center; }
  .role-btn.active { background:var(--terra); border-color:var(--terra); color:var(--beige); font-weight:500; }
  .pin-label { font-size:10px; letter-spacing:.2em; text-transform:uppercase; color:var(--text-dim); margin-bottom:10px; display:block; }
  .pin-dots { display:flex; gap:12px; justify-content:center; margin-bottom:20px; }
  .pin-dot { width:14px; height:14px; border-radius:50%; border:2px solid var(--stone2); background:transparent; transition:all .2s; }
  .pin-dot.filled { background:var(--terra); border-color:var(--terra); }
  .numpad { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
  .num-btn { padding:16px; border-radius:var(--radius); border:1px solid var(--stone2); background:var(--beige); color:var(--text); font-family:'Jost',sans-serif; font-size:20px; cursor:pointer; transition:all .15s; text-align:center; }
  .num-btn:hover { background:var(--beige3); border-color:var(--terra-border); }
  .num-btn:active { transform:scale(.95); }
  .num-btn.del { font-size:16px; color:var(--text-dim); }
  .login-error { color:var(--terra-dark); font-size:12px; text-align:center; margin-top:12px; min-height:18px; }
  .login-name-input { width:100%; background:var(--beige); border:1px solid var(--stone2); border-radius:var(--radius); padding:11px 14px; font-family:'Jost',sans-serif; font-size:14px; color:var(--text); outline:none; caret-color:var(--terra); margin-bottom:16px; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }
  /* ── ROLE BADGE ── */

  .logout-btn:hover { border-color:var(--terra); color:var(--terra); }

  .sync-dot.syncing { background:var(--terra); animation:pulse .8s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
  /* ── HEADER ── */
  header { text-align:center; padding:44px 20px 20px; position:relative; border-bottom:1px solid var(--stone2); background:linear-gradient(180deg,rgba(181,96,58,.06) 0%,transparent 100%); }

  .progress-bar-fill { height:100%; background:linear-gradient(90deg,var(--terra),var(--terra-dark)); border-radius:99px; transition:width .5s cubic-bezier(.4,0,.2,1); width:0%; }
  /* ── DEPT TABS ── */
  .dept-tabs { display:flex; gap:6px; padding:14px 20px 0; max-width:760px; margin:0 auto; overflow-x:auto; scrollbar-width:none; }

  .dept-btn.active { background:var(--terra-dark); border-color:var(--terra-dark); color:var(--beige); font-weight:500; box-shadow:0 4px 14px rgba(140,69,40,.3); }

  /* ── SUB TABS ── */
  .sub-tabs-wrap { display:flex; align-items:center; gap:8px; padding:10px 20px 0; max-width:760px; margin:0 auto; }
  .sub-tabs { display:flex; gap:6px; overflow-x:auto; scrollbar-width:none; flex:1; }
  .sub-tabs::-webkit-scrollbar { display:none; }
  .sub-btn { flex-shrink:0; padding:8px 14px; border-radius:99px; border:1px solid var(--stone2); background:var(--beige2); color:var(--text-dim); font-family:'Jost',sans-serif; font-size:12px; cursor:pointer; transition:all .2s; display:flex; align-items:center; gap:6px; }

  .day-task-item:hover { background:var(--beige3); border-color:var(--terra-border); }
  .day-task-item.fully-done .day-task-text { text-decoration:line-through; color:var(--text-dim); }
  .day-task-checks { display:flex; gap:4px; flex-shrink:0; }
  .day-check-wrap { display:flex; flex-direction:column; align-items:center; gap:2px; cursor:pointer; }
  .day-check-label { font-size:7px; text-transform:uppercase; color:var(--stone); white-space:nowrap; }
  .day-task-circle { width:16px; height:16px; border-radius:50%; border:2px solid var(--stone2); display:flex; align-items:center; justify-content:center; transition:all .18s; }
  .day-check-wrap:hover .day-task-circle { border-color:var(--terra); }
  .day-check-wrap.staff-done .day-task-circle { background:var(--vert); border-color:var(--vert); }
  .day-check-wrap.manager-done .day-task-circle { background:var(--bleu); border-color:var(--bleu); }
  .day-task-text { font-size:13px; color:var(--text); flex:1; }
  .day-task-delete { background:none; border:none; color:var(--stone2); font-size:15px; cursor:pointer; display:none; transition:color .2s; }
  body.manager .day-task-delete { display:block; }
  .day-task-delete:hover { color:var(--terra); }
  .day-add-btn { display:none; align-items:center; gap:5px; padding:6px 8px; border-radius:7px; margin-top:5px; background:none; border:1px dashed var(--stone2); color:var(--text-dim); font-family:'Jost',sans-serif; font-size:11px; cursor:pointer; width:100%; transition:all .2s; }
  body.manager .day-add-btn { display:flex; }
  .day-add-btn:hover { border-color:var(--terra); color:var(--terra); }
  /* ── MODAL ── */
  .modal-overlay { position:fixed; inset:0; background:rgba(58,46,38,.5); display:flex; align-items:flex-end; justify-content:center; z-index:100; opacity:0; pointer-events:none; transition:opacity .2s; }
  .modal-overlay.open { opacity:1; pointer-events:all; }
  .modal { background:var(--beige); border-radius:18px 18px 0 0; padding:24px 20px 40px; width:100%; max-width:760px; transform:translateY(100%); transition:transform .3s cubic-bezier(.4,0,.2,1); }

  s_soir:[{text:'Remplir les consoles'},{text:'Remplir les frigos eau'},{text:'Changer cocktail signature'},{text:'Nettoyer machine à café'},{text:'Faire les dates'},{text:'Remplir les laits'},{text:'Vider poubelle machine à café'},{text:'Redresser salle'},{text:'Retourner les verres'},{text:'De dresser la terrasse'},{text:'Faire le linge'},{text:'Nettoyer frigo bar'},{text:'Nettoyer frigo cave'},{text:'Nettoyer iPad et iPhone'},{text:'Brancher iPad et iPhone'},{text:'Vider poubelle à papier'},{text:'Nettoyer pass'},{text:'Nettoyer plateaux'},{text:'Nettoyer console'},{text:'Faire les vides'},{text:'Ranger bougie'},{text:'Sortir les poubelles de la plonge'},{text:'Rentrer console terrasse'},{text:'Fermer les portes'},{text:'Fermer les rideaux'},{text:'Tcheck VAE'},{text:'Préparer redresse terrasse (x32)'}],
  a_matin:[{text:'Lumière : lunch avec toilette 13%'},{text:'Musique : Spotify salle + toilette'},{text:"Desk : tout nettoyer (iPad et téléphone inclus), ranger les menus et les contrôler"},{text:'Nettoyer les armoires / vitres si besoin'},{text:"Extérieur : nettoyer le menu et insérer la batterie"},{text:"Rideaux : ranger les rideaux de l'entrée et les rideaux automatiques blancs"},{text:'Contrôler les menus dessert dans les consoles'},{text:'Nettoyer les ports addition (console) et les remplir avec les cartes de visite'},{text:'Toilettes : contrôler et remplir les oshibori et le savon pour les mains'},{text:'Contrôler Open Table (jamais de réservation sur unavailable table quand possible)'},{text:'Faire la carcasse avec les serveurs et les informer en avance pour les informations sur les clients'},{text:'Menu : imprimer si besoin (pour la personne à 10h)'},{text:'Mail : contrôler et répondre'},{text:'Confirmation midi si à 10h — confirmation soir si à 12h'}],

  a_soir:[{text:'Récupérer tous les menus, les contrôler et les ranger'},{text:'Ranger et nettoyer le desk'},{text:'Mettre les iPad et téléphone en charge'},{text:'Mettre toutes les tables en "Finish"'},{text:'Vérifier les toilettes'},{text:'Vider poubelle armoire'},{text:"Ranger, nettoyer le menu d'extérieur et mettre en charge la batterie au desk"}],

  b_soir:[{text:'Lavage matériel à la main'},{text:'Nettoyage des speedrails - bouteilles cocktails, dessous de celles-ci'},{text:'Jeter les garnitures'},{text:'MEP des grilles de stations au lave-vaisselle et séchage'},{text:"S'assurer que tous les verres soient nettoyés"},{text:'Vérifier les étiquettes DLC et JUS'},{text:'Laver les vitres et les joints des frigos'},{text:'Recharger les frigos pour le service suivant'},{text:'Nettoyer les tables bar + comptoir avec le produit adapté'},{text:'Nettoyage des plateaux de services'},{text:'Nettoyager les chaises + banquettes si besoin'},{text:'Nettoyage filtres machines à verres + éteindre cette dernière'},{text:'Vider/nettoyer les poubelles bars'},{text:'Laver lavettes/microfibres'},{text:'Fermer les frigos bar'},{text:'Fermer les frigos arrières cuisine'}],
};
const DEFAULT_WEEKLY_TASKS={lundi:['Nettoyer pieds de tables et pieds de chaises','Faire les couverts avec produit argenterie'],mardi:['Remplir et nettoyer sels et poivres','Vider les plateformes avec les décorations et les nettoyer'],mercredi:['Nettoyage du vestiaire et toilettes staff','Nettoyage de la machine à café et moulin'],jeudi:['Nettoyage vitre du comptoir','Nettoyage du miroir et LED au dessus du comptoir'],vendredi:['Nettoyer le dessus des portes ainsi que les contours','Nettoyer les murs de la plonge'],samedi:['Vider les plateformes avec décoration et les nettoyer','Nettoyer les sacs à fond au sel'],dimanche:['Nettoyer les théières avec le produit à argenterie']};

// ── STATE ──
let state={};
let ignoreNextSnapshot=false;
let saveTimeout=null;

function getDepts(){if(!state.depts)state.depts=JSON.parse(JSON.stringify(DEFAULT_DEPTS));return state.depts;}
function getSubs(deptId){if(!state.subs)state.subs={};if(!state.subs[deptId])state.subs[deptId]=JSON.parse(JSON.stringify(DEFAULT_SUBS[deptId]||[]));return state.subs[deptId];}
function getTasks(subId){if(!state.tasks)state.tasks={};if(!state.tasks[subId])state.tasks[subId]=PRESET_TASKS[subId]?JSON.parse(JSON.stringify(PRESET_TASKS[subId])):[];return state.tasks[subId];}
function isHebdo(subId){return subId.endsWith('_hebdo');}
function getWeeklyData(deptId){if(!state.weekly)state.weekly={};if(!state.weekly[deptId])state.weekly[deptId]=deptId==='salle'?JSON.parse(JSON.stringify(DEFAULT_WEEKLY_TASKS)):{lundi:[],mardi:[],mercredi:[],jeudi:[],vendredi:[],samedi:[],dimanche:[]};return state.weekly[deptId];}
function getWeeklyDone(deptId){if(!state.weeklyDone)state.weeklyDone={};if(!state.weeklyDone[deptId])state.weeklyDone[deptId]={};return state.weeklyDone[deptId];}

// ── SAVE: Firebase + localStorage ──
function save(){
  localStorage.setItem('zephyr_local',JSON.stringify(state));
  setSyncing(true);
  ignoreNextSnapshot=true;
  if(saveTimeout) clearTimeout(saveTimeout);
  saveTimeout = setTimeout(async()=>{
    if(window.fbSave){
      await window.fbSave(state);
      setSyncing(false);
    }
  },800);
}

function setSyncing(s){
  const dot=document.getElementById('sync-dot');
  if(dot) dot.className='sync-dot'+(s?' syncing':'');
}

// ── LOGIN ──
let selectedRole='employee',currentPin='',currentUser='',currentRole='';
let activeDept='salle',activeSub='s_matin';
let unsubFirebase=null;

function selectRole(r){selectedRole=r;document.getElementById('role-btn-employee').classList.toggle('active',r==='employee');document.getElementById('role-btn-manager').classList.toggle('active',r==='manager');currentPin='';updateDots();document.getElementById('login-error').textContent='';}
function pinPress(d){if(currentPin.length>=4)return;currentPin+=d;updateDots();if(currentPin.length===4)setTimeout(tryLogin,150);}
function pinDelete(){currentPin=currentPin.slice(0,-1);updateDots();}
function pinClear(){currentPin='';updateDots();}
function updateDots(){for(let i=0;i<4;i++)document.getElementById('dot-'+i).classList.toggle('filled',i<currentPin.length);}

async function tryLogin(){
  const name=document.getElementById('login-name').value.trim();
  if(!name){document.getElementById('login-error').textContent='Veuillez entrer votre prénom.';currentPin='';updateDots();return;}
  if(currentPin===CODES[selectedRole]){
    currentRole=selectedRole;currentUser=name;
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app').style.display='block';
    document.getElementById('report-bar').style.display='block';
    document.getElementById('role-badge').style.display='flex';
    const pill=document.getElementById('role-pill');
    pill.textContent=currentRole==='manager'?'🔑 Manager — '+currentUser:'👤 '+currentUser;
    pill.className='role-pill'+(currentRole==='employee'?' employee':'');
    document.body.className=currentRole;

    // Load from Firebase first
    showToast('Chargement...');
    const fbData = await window.fbLoad?.();
    if(fbData) { state=fbData; }
    else {
      const local=localStorage.getItem('zephyr_local');
      if(local) state=JSON.parse(local);
    }

    initApp();
    startFirebaseListener();
  } else {
    document.getElementById('login-error').textContent='Code incorrect.';
    currentPin='';updateDots();
    const c=document.querySelector('.login-card');c.style.animation='none';setTimeout(()=>{c.style.animation='shake .3s ease';},10);
  }
}

function startFirebaseListener(){
  if(!window.fbListen)return;
  unsubFirebase=window.fbListen((remoteState)=>{
    if(ignoreNextSnapshot){ignoreNextSnapshot=false;return;}
    state=remoteState;
    localStorage.setItem('zephyr_local',JSON.stringify(state));
    // Re-render current view
    renderDeptTabs();renderSubTabs();renderCurrentSection();updateGlobal();
    showToast('✨ Mis à jour en temps réel');
  });
}

function logout(){
  if(unsubFirebase){unsubFirebase();unsubFirebase=null;}
  currentRole='';currentUser='';currentPin='';document.body.className='';
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('app').style.display='none';
  document.getElementById('report-bar').style.display='none';
  document.getElementById('role-badge').style.display='none';
  document.getElementById('login-name').value='';
  document.getElementById('login-error').textContent='';
  updateDots();
}

// ── RENDER DEPT TABS ──
function renderDeptTabs(){
  const depts=getDepts();
  const c=document.getElementById('dept-tabs');c.innerHTML='';
  depts.forEach(dept=>{
    const btn=document.createElement('button');
    btn.className='dept-btn'+(dept.id===activeDept?' active':'');
    const{total,done}=getDeptProgress(dept.id);
    btn.innerHTML=`${dept.name} <span class="dept-badge">${done}/${total}</span>`;
    btn.onclick=()=>showDept(dept.id);
    c.appendChild(btn);
  });
  updateReportBtn();
}
function getDeptProgress(deptId){
  const subs=getSubs(deptId);let total=0,done=0;
  subs.forEach(sub=>{
    if(isHebdo(sub.id)){const data=getWeeklyData(deptId),dd=getWeeklyDone(deptId);DAYS.forEach(day=>{const tasks=data[day]||[],sa=dd['staff_'+day]||[],ma=dd['manager_'+day]||[];total+=tasks.length;done+=tasks.filter((_,i)=>sa[i]&&ma[i]).length;});}
    else{const r=countSection(sub.id);total+=r.total;done+=r.checked;}
  });
  return{total,done};
}
function showDept(deptId){activeDept=deptId;const subs=getSubs(deptId);activeSub=subs[0]?.id||'';renderDeptTabs();renderSubTabs();renderCurrentSection();}

// ── RENDER SUB TABS ──
function renderSubTabs(){
  const subs=getSubs(activeDept);const c=document.getElementById('sub-tabs');c.innerHTML='';
  subs.forEach(sub=>{
    const btn=document.createElement('button');
    let badge='';
    if(isHebdo(sub.id)){const{total,done}=getHebdoProgress(activeDept);badge=done+'/'+total;}
    else{const r=countSection(sub.id);badge=r.checked+'/'+r.total;}
    const isDone=badge.split('/')[0]===badge.split('/')[1]&&badge.split('/')[1]!=='0';
    btn.className='sub-btn'+(sub.id===activeSub?' active':'')+(isDone&&sub.id!==activeSub?' done':'');
    btn.innerHTML=`${sub.emoji} ${sub.name} <span class="sub-badge" id="sbadge-${sub.id}">${badge}</span>`;
    btn.onclick=()=>showSub(sub.id);
    c.appendChild(btn);
  });
}
function getHebdoProgress(deptId){const data=getWeeklyData(deptId),dd=getWeeklyDone(deptId);let total=0,done=0;DAYS.forEach(day=>{const tasks=data[day]||[],sa=dd['staff_'+day]||[],ma=dd['manager_'+day]||[];total+=tasks.length;done+=tasks.filter((_,i)=>sa[i]&&ma[i]).length;});return{total,done};}
function showSub(subId){activeSub=subId;renderSubTabs();renderCurrentSection();}

// ── RENDER SECTION ──
function renderCurrentSection(){
  const subs=getSubs(activeDept);const sub=subs.find(s=>s.id===activeSub);if(!sub)return;
  const c=document.getElementById('sections-container');c.innerHTML='';
  if(isHebdo(sub.id))renderWeeklySection(activeDept);
  else renderChecklistSection(sub);
}

function renderChecklistSection(sub){
  const c=document.getElementById('sections-container');
  const tasks=getTasks(sub.id);
  const sa=state['staff_'+sub.id]||[],ma=state['manager_'+sub.id]||[];
  const names=state.names||{};
  const{checked,total}=countSection(sub.id);
  const sec=document.createElement('div');
  sec.className='section active';sec.id='section-'+sub.id;
  sec.innerHTML=`
    <div class="section-header">
      <div class="section-title"><span>${sub.emoji}</span><span>${sub.name}</span><button class="rename-btn" onclick="openRenameSub('${sub.id}')">✏️</button></div>
      <div class="header-actions">
        <span class="section-progress" id="prog-${sub.id}">${checked} / ${total}</span>
        <button class="reset-btn" onclick="resetSection('${sub.id}')">Réinit.</button>
        <button class="add-task-btn" onclick="openAddTask('${sub.id}')">+</button>
      </div>
    </div>
    <div class="name-fields-row">
      <div class="name-field"><label>👤 Employé</label><input type="text" id="ns-${sub.id}" placeholder="Prénom..." oninput="saveName('${sub.id}','staff',this.value)" value="${names['staff_'+sub.id]||''}" autocomplete="off"></div>
      <div class="name-field" style="border-left:2px solid var(--bleu)"><label style="color:var(--bleu)">✓ Manager</label><input type="text" id="nm-${sub.id}" placeholder="Prénom..." oninput="saveName('${sub.id}','manager',this.value)" value="${names['manager_'+sub.id]||''}" autocomplete="off"></div>
    </div>
    <ul class="checklist" id="list-${sub.id}"></ul>
    <div class="all-done" id="done-${sub.id}"><div class="all-done-icon">✅</div><h3>${sub.name} complet !</h3><p>Toutes les tâches effectuées et validées.</p></div>`;
  c.appendChild(sec);
  const si=document.getElementById('ns-'+sub.id);const mi=document.getElementById('nm-'+sub.id);
  if(currentRole==='employee'&&si&&!si.value)si.value=currentUser;
  if(currentRole==='manager'&&mi&&!mi.value)mi.value=currentUser;
  renderChecklist(sub.id);
}

function renderChecklist(subId){
  const tasks=getTasks(subId);
  const sa=state['staff_'+subId]||[],ma=state['manager_'+subId]||[];
  const ul=document.getElementById('list-'+subId);if(!ul)return;
  ul.innerHTML='';
  if(tasks.length===0){ul.innerHTML=`<div class="empty-state"><div class="empty-icon">📝</div>Aucune tâche — appuie sur + pour en ajouter</div>`;updateBadge(subId);return;}
  tasks.forEach((task,i)=>{
    const li=document.createElement('li');
    if(sa[i]&&ma[i])li.classList.add('task-fully-done');
    li.innerHTML=`<div class="task-row">
      <div class="task-arrows"><button class="arrow-btn" onclick="moveTask('${subId}',${i},-1)" ${i===0?'disabled':''}>▲</button><button class="arrow-btn" onclick="moveTask('${subId}',${i},1)" ${i===tasks.length-1?'disabled':''}>▼</button></div>
      <div class="task-checks">
        <div class="check-wrap${sa[i]?' staff-done':''}" onclick="toggleStaff('${subId}',${i},this)"><div class="check-circle">${SVG}</div><span class="check-label">Équipe</span></div>
        <div class="check-wrap${ma[i]?' manager-done':''}" onclick="toggleManager('${subId}',${i},this)"><div class="check-circle">${SVG}</div><span class="check-label" style="color:var(--bleu)">Manager</span></div>
      </div>
      <div class="task-content"><div class="item-text">${task.text}</div><div class="task-badges"><span class="badge-staff${sa[i]?' show':''}">✓ Équipe</span><span class="badge-manager${ma[i]?' show':''}">✓ Manager</span></div></div>
      <div class="task-actions"><button class="task-edit" onclick="openEditTask('${subId}',${i})">✏️</button><button class="task-delete" onclick="deleteTask('${subId}',${i})">×</button></div>
    </div>`;
    ul.appendChild(li);
  });
  updateBadge(subId);
}

// ── CHECK LOGIC ──
function toggleStaff(subId,idx,el){
  el.classList.toggle('staff-done');
  const li=el.closest('li');
  li.querySelector('.badge-staff')?.classList.toggle('show',el.classList.contains('staff-done'));
  li.classList.toggle('task-fully-done',el.classList.contains('staff-done')&&li.querySelector('.check-wrap:last-child').classList.contains('manager-done'));
  saveSectionState(subId);updateBadge(subId);updateGlobal();
}
function toggleManager(subId,idx,el){
  if(currentRole!=='manager'){showToast('Réservé au manager 🔑');return;}
  el.classList.toggle('manager-done');
  const li=el.closest('li');
  li.querySelector('.badge-manager')?.classList.toggle('show',el.classList.contains('manager-done'));
  li.classList.toggle('task-fully-done',el.classList.contains('manager-done')&&li.querySelector('.check-wrap:first-child').classList.contains('staff-done'));
  saveSectionState(subId);updateBadge(subId);updateGlobal();
}
function saveSectionState(subId){
  const items=document.getElementById('list-'+subId)?.querySelectorAll('li');if(!items)return;
  const s=[],m=[];
  items.forEach(li=>{const ws=li.querySelectorAll('.check-wrap');s.push(ws[0]?.classList.contains('staff-done')||false);m.push(ws[1]?.classList.contains('manager-done')||false);});
  state['staff_'+subId]=s;state['manager_'+subId]=m;save();
}
function countSection(subId){const tasks=getTasks(subId),sa=state['staff_'+subId]||[],ma=state['manager_'+subId]||[];return{checked:tasks.filter((_,i)=>sa[i]&&ma[i]).length,total:tasks.length};}
function updateBadge(subId){
  const{checked,total}=countSection(subId);
  const b=document.getElementById('sbadge-'+subId);if(b)b.textContent=checked+'/'+total;
  const p=document.getElementById('prog-'+subId);if(p)p.textContent=checked+' / '+total;
  const done=document.getElementById('done-'+subId);if(done)done.classList.toggle('visible',checked===total&&total>0);
  renderSubTabs();renderDeptTabs();
}
function updateGlobal(){
  let tc=0,ta=0;getDepts().forEach(dept=>{const p=getDeptProgress(dept.id);tc+=p.done;ta+=p.total;});
  document.getElementById('globalCount').textContent=tc+' / '+ta;
  document.getElementById('globalBar').style.width=(ta>0?(tc/ta*100):0)+'%';
}
function resetSection(subId){
  state['staff_'+subId]=[];state['manager_'+subId]=[];
  if(!state.names)state.names={};state.names['staff_'+subId]='';state.names['manager_'+subId]='';
  save();renderCurrentSection();updateGlobal();showToast('Réinitialisé ✓');
}
function moveTask(subId,idx,dir){
  const tasks=getTasks(subId),sa=state['staff_'+subId]||[],ma=state['manager_'+subId]||[];
  const ni=idx+dir;if(ni<0||ni>=tasks.length)return;
  [tasks[idx],tasks[ni]]=[tasks[ni],tasks[idx]];[sa[idx],sa[ni]]=[sa[ni]||false,sa[idx]||false];[ma[idx],ma[ni]]=[ma[ni]||false,ma[idx]||false];
  if(!state.tasks)state.tasks={};state.tasks[subId]=tasks;state['staff_'+subId]=sa;state['manager_'+subId]=ma;
  save();renderChecklist(subId);
}

// ── ADD/EDIT/DELETE ──
let addTarget='',editTarget='',editIdx=-1;
function openAddTask(subId){addTarget=subId;document.getElementById('add-task-input').value='';openModal('modal-add-task');setTimeout(()=>document.getElementById('add-task-input').focus(),300);}
function confirmAddTask(){
  const text=document.getElementById('add-task-input').value.trim();if(!text)return;
  getTasks(addTarget).push({text});save();renderChecklist(addTarget);closeModal('modal-add-task');showToast('Tâche ajoutée ✓');
}
function openEditTask(subId,idx){
  editTarget=subId;editIdx=idx;
  document.getElementById('edit-task-input').value=getTasks(subId)[idx].text;
  openModal('modal-edit-task');setTimeout(()=>document.getElementById('edit-task-input').focus(),300);
}
function confirmEditTask(){
  const text=document.getElementById('edit-task-input').value.trim();if(!text)return;
  getTasks(editTarget)[editIdx].text=text;
  if(!state.tasks)state.tasks={};state.tasks[editTarget]=getTasks(editTarget);
  save();renderChecklist(editTarget);closeModal('modal-edit-task');showToast('Tâche modifiée ✓');
}
function deleteTask(subId,idx){
  const tasks=getTasks(subId),sa=state['staff_'+subId]||[],ma=state['manager_'+subId]||[];
  tasks.splice(idx,1);sa.splice(idx,1);ma.splice(idx,1);
  if(!state.tasks)state.tasks={};state.tasks[subId]=tasks;state['staff_'+subId]=sa;state['manager_'+subId]=ma;
  save();renderChecklist(subId);updateGlobal();
}
function saveName(subId,role,value){if(!state.names)state.names={};state.names[role+'_'+subId]=value;save();}

// ── SUB TAB MANAGEMENT ──
let emojiRename='🌅',emojiNew='🌅',renameSubTarget='';
function pickEmoji(el,type){
  const picker=type==='rename'?'emoji-rename':'emoji-new';
  document.querySelectorAll('#'+picker+' .emoji-opt').forEach(e=>e.classList.remove('selected'));
  el.classList.add('selected');
  if(type==='rename')emojiRename=el.textContent;else emojiNew=el.textContent;
}
function openRenameSub(subId){
  renameSubTarget=subId;const subs=getSubs(activeDept),sub=subs.find(s=>s.id===subId);
  document.getElementById('rename-sub-input').value=sub?sub.name:'';emojiRename=sub?sub.emoji:'🌅';
  document.querySelectorAll('#emoji-rename .emoji-opt').forEach(e=>e.classList.toggle('selected',e.textContent===emojiRename));
  openModal('modal-rename-sub');setTimeout(()=>document.getElementById('rename-sub-input').focus(),300);
}
function confirmRenameSub(){
  const name=document.getElementById('rename-sub-input').value.trim();if(!name)return;
  const subs=getSubs(activeDept),sub=subs.find(s=>s.id===renameSubTarget);
  if(sub){sub.name=name;sub.emoji=emojiRename;}
  save();closeModal('modal-rename-sub');renderSubTabs();renderCurrentSection();showToast('Onglet renommé ✓');
}
function openNewSubModal(){document.getElementById('new-sub-input').value='';emojiNew='🌅';document.querySelectorAll('#emoji-new .emoji-opt').forEach((e,i)=>e.classList.toggle('selected',i===0));openModal('modal-new-sub');setTimeout(()=>document.getElementById('new-sub-input').focus(),300);}
function confirmNewSub(){
  const name=document.getElementById('new-sub-input').value.trim();if(!name)return;
  const id=activeDept+'_'+Date.now();const subs=getSubs(activeDept);const hebdoIdx=subs.findIndex(s=>isHebdo(s.id));
  const newSub={id,emoji:emojiNew,name};if(hebdoIdx>=0)subs.splice(hebdoIdx,0,newSub);else subs.push(newSub);
  if(!state.tasks)state.tasks={};state.tasks[id]=[];
  save();activeSub=id;closeModal('modal-new-sub');renderSubTabs();renderCurrentSection();showToast('Onglet créé ✓');
}

// ── WEEKLY ──
function renderWeeklySection(deptId){
  const c=document.getElementById('sections-container');const sec=document.createElement('div');sec.className='section active';
  sec.innerHTML=`<div class="section-header"><div class="section-title"><span>📅</span><span>Tâches hebdo</span></div><div class="header-actions"><button class="reset-btn" onclick="resetWeekly('${deptId}')">Réinit.</button></div></div>
    <div id="weekly-container-${deptId}"></div>
    <button class="weekly-send-btn" onclick="sendWeeklyReport('${deptId}')">📧 Rapport hebdo — ${getDepts().find(d=>d.id===deptId)?.name||deptId}</button>`;
  c.appendChild(sec);renderWeekly(deptId);
}
function renderWeekly(deptId){
  const data=getWeeklyData(deptId),done=getWeeklyDone(deptId);
  const c=document.getElementById('weekly-container-'+deptId);if(!c)return;c.innerHTML='';
  DAYS.forEach(day=>{
    const tasks=data[day]||[],sa=done['staff_'+day]||[],ma=done['manager_'+day]||[];
    const fd=tasks.filter((_,i)=>sa[i]&&ma[i]).length;
    const block=document.createElement('div');block.className='day-block'+(day===TODAY?' open':'');
    block.innerHTML=`<div class="day-header" onclick="this.parentElement.classList.toggle('open')"><div class="day-title-wrap"><span>${DAY_ICONS[day]}</span><span class="day-name">${DAY_LABELS[day]}</span><span class="day-count" id="dcnt-${deptId}-${day}">${fd}/${tasks.length}${day===TODAY?' — Aujourd\'hui':''}</span></div><span class="day-chevron">▾</span></div><div class="day-tasks" id="dtasks-${deptId}-${day}"></div>`;
    c.appendChild(block);renderDayTasks(deptId,day);
  });
}
function renderDayTasks(deptId,day){
  const data=getWeeklyData(deptId),done=getWeeklyDone(deptId);
  const tasks=data[day]||[],sa=done['staff_'+day]||[],ma=done['manager_'+day]||[];
  const c=document.getElementById('dtasks-'+deptId+'-'+day);if(!c)return;c.innerHTML='';
  tasks.forEach((t,i)=>{
    const sd=sa[i]||false,md=ma[i]||false;const item=document.createElement('div');item.className='day-task-item'+(sd&&md?' fully-done':'');
    item.innerHTML=`<div class="day-task-checks"><div class="day-check-wrap${sd?' staff-done':''}" onclick="toggleDayStaff('${deptId}','${day}',${i})"><div class="day-task-circle">${sd?SVG:''}</div><span class="day-check-label">Équipe</span></div><div class="day-check-wrap${md?' manager-done':''}" onclick="toggleDayManager('${deptId}','${day}',${i})"><div class="day-task-circle">${md?SVG:''}</div><span class="day-check-label" style="color:var(--bleu)">Mgr</span></div></div><div class="day-task-text" style="flex:1">${t}</div><button class="day-task-delete" onclick="deleteDayTask('${deptId}','${day}',${i})">×</button>`;
    c.appendChild(item);
  });
  const btn=document.createElement('button');btn.className='day-add-btn';btn.innerHTML='+ Ajouter';btn.onclick=()=>addDayTask(deptId,day);c.appendChild(btn);
}
function toggleDayStaff(deptId,day,idx){const d=getWeeklyDone(deptId);if(!d['staff_'+day])d['staff_'+day]=[];d['staff_'+day][idx]=!d['staff_'+day][idx];save();renderDayTasks(deptId,day);updateDayCount(deptId,day);updateGlobal();}
function toggleDayManager(deptId,day,idx){if(currentRole!=='manager'){showToast('Réservé au manager 🔑');return;}const d=getWeeklyDone(deptId);if(!d['manager_'+day])d['manager_'+day]=[];d['manager_'+day][idx]=!d['manager_'+day][idx];save();renderDayTasks(deptId,day);updateDayCount(deptId,day);updateGlobal();}
function deleteDayTask(deptId,day,idx){if(currentRole!=='manager')return;const data=getWeeklyData(deptId),d=getWeeklyDone(deptId);data[day].splice(idx,1);if(d['staff_'+day])d['staff_'+day].splice(idx,1);if(d['manager_'+day])d['manager_'+day].splice(idx,1);save();renderDayTasks(deptId,day);updateDayCount(deptId,day);updateGlobal();}
function addDayTask(deptId,day){const text=prompt('Nouvelle tâche pour '+DAY_LABELS[day]+' :');if(!text||!text.trim())return;getWeeklyData(deptId)[day].push(text.trim());save();renderDayTasks(deptId,day);updateDayCount(deptId,day);updateGlobal();}
function updateDayCount(deptId,day){const data=getWeeklyData(deptId),d=getWeeklyDone(deptId);const tasks=data[day]||[],sa=d['staff_'+day]||[],ma=d['manager_'+day]||[];const fd=tasks.filter((_,i)=>sa[i]&&ma[i]).length;const cnt=document.getElementById('dcnt-'+deptId+'-'+day);if(cnt)cnt.textContent=fd+'/'+tasks.length+(day===TODAY?' — Aujourd\'hui':'');}
function resetWeekly(deptId){if(!state.weeklyDone)state.weeklyDone={};state.weeklyDone[deptId]={};save();renderWeekly(deptId);showToast('Hebdo réinitialisé ✓');}

// ── REPORT ──
function updateReportBtn(){const dept=getDepts().find(d=>d.id===activeDept);const btn=document.getElementById('report-btn');if(btn&&dept)btn.textContent='📧 Envoyer le rapport — '+dept.name;}
async function sendDeptReport(){
  const dept=getDepts().find(d=>d.id===activeDept);const subs=getSubs(activeDept);
  const now=new Date().toLocaleDateString('fr-FR',{weekday:'long',year:'numeric',month:'long',day:'numeric'});const names=state.names||{};
  let msg='RAPPORT — '+dept.name.toUpperCase()+'\n'+'='.repeat(40)+'\nDate : '+now+'\n';
  subs.forEach(sub=>{
    if(isHebdo(sub.id)){const data=getWeeklyData(activeDept),done=getWeeklyDone(activeDept);msg+='\n\n── HEBDOMADAIRE ──';DAYS.forEach(day=>{const tasks=data[day]||[],sa=done['staff_'+day]||[],ma=done['manager_'+day]||[];if(tasks.length>0){msg+='\n'+DAY_LABELS[day]+' : '+tasks.map((t,i)=>(sa[i]&&ma[i]?'✅':'❌')+' '+t).join(' | ');}});}
    else{const tasks=getTasks(sub.id),sa=state['staff_'+sub.id]||[],ma=state['manager_'+sub.id]||[];msg+='\n\n── '+sub.emoji+' '+sub.name.toUpperCase()+' ──\nEmployé : '+(names['staff_'+sub.id]||'—')+' | Manager : '+(names['manager_'+sub.id]||'—')+'\n';msg+=tasks.length>0?tasks.map((t,i)=>(sa[i]&&ma[i]?'✅':sa[i]?'⚠️':'❌')+' '+t.text).join('\n'):'(aucune tâche)';}
  });
  msg+='\n\n— Envoyé depuis l\'application Zephyr Monaco';
  showToast('Envoi en cours...');
  try{await emailjs.send(EMAILJS_SERVICE,EMAILJS_TEMPLATE,{subject:'Rapport '+dept.name+' — '+now,message:msg,name:currentUser||'Zephyr',email:'restaurant@zephyrmonaco.com'});showToast('✅ Rapport '+dept.name+' envoyé !');}
  catch(e){showToast('❌ Erreur : '+(e.text||e.message));}
}
async function sendWeeklyReport(deptId){
  const dept=getDepts().find(d=>d.id===deptId);const data=getWeeklyData(deptId),done=getWeeklyDone(deptId);
  const now=new Date().toLocaleDateString('fr-FR',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  let lines=[];DAYS.forEach(day=>{lines.push('\n— '+DAY_LABELS[day].toUpperCase()+' —');const tasks=data[day]||[],sa=done['staff_'+day]||[],ma=done['manager_'+day]||[];tasks.forEach((t,i)=>lines.push((sa[i]&&ma[i]?'✅':sa[i]?'⚠️':'❌')+' '+t));});
  const msg='RAPPORT HEBDO — '+dept.name.toUpperCase()+'\n'+'='.repeat(40)+'\nDate : '+now+'\n'+lines.join('\n')+'\n\n— Envoyé depuis l\'application Zephyr Monaco';
  showToast('Envoi en cours...');
  try{await emailjs.send(EMAILJS_SERVICE,EMAILJS_TEMPLATE,{subject:'Rapport Hebdo '+dept.name+' — '+now,message:msg,name:currentUser||'Zephyr',email:'restaurant@zephyrmonaco.com'});showToast('✅ Rapport hebdo envoyé !');}
  catch(e){showToast('❌ Erreur : '+(e.text||e.message));}
}

// ── MODAL / TOAST ──
function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

// ── INIT ──
function initApp(){
  activeDept='salle';activeSub=getSubs('salle')[0]?.id||'s_matin';
  renderDeptTabs();renderSubTabs();renderCurrentSection();updateGlobal();
}
</script>
</body>
